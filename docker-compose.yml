# ============================================================
# PinjamMobil - Docker Compose Configuration
# Development & Production Ready
# ============================================================

services:

  # ============================================================
  # MySQL Database
  # ============================================================
  db:
    image: mysql:8.0
    container_name: pinjammobil-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pinjammobil}
      MYSQL_USER: ${DB_USERNAME:-pinjammobil}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - pinjammobil-network

  # ============================================================
  # Redis Cache & Session Store
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: pinjammobil-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - pinjammobil-network

  # ============================================================
  # Laravel Application (PHP-FPM)
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pinjammobil-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-pinjammobil}
      - DB_USERNAME=${DB_USERNAME:-pinjammobil}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - REDIS_PORT=6379
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pinjammobil-network

  # ============================================================
  # Nginx Web Server
  # ============================================================
  web:
    image: nginx:alpine
    container_name: pinjammobil-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - pinjammobil-network

  # ============================================================
  # Laravel Queue Worker
  # ============================================================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pinjammobil-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-pinjammobil}
      - DB_USERNAME=${DB_USERNAME:-pinjammobil}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - pinjammobil-network

  # ============================================================
  # Laravel Task Scheduler
  # ============================================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pinjammobil-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:run
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-pinjammobil}
      - DB_USERNAME=${DB_USERNAME:-pinjammobil}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - pinjammobil-network

  # ============================================================
  # phpMyAdmin (Optional - for database management)
  # ============================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pinjammobil-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 10M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - db
    networks:
      - pinjammobil-network

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_public:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  pinjammobil-network:
    driver: bridge
